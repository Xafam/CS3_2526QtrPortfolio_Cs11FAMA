<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="author" content="Sir Roy/Al Mendoza">
  <meta name="description" content="testing and debugging">
  <meta name="keywords" content="testing and debugging">
  <title>CS 3</title>

  <link href="style.css" rel="stylesheet" type="text/css" />

  <style>
    tr:nth-child(1) ~ tr:nth-child(odd) {
      background-color: lightgray;
      color: black;
    }

    td, th {
      padding: 10px;
    }

    table {
      width: 90%;
      margin: 0 auto;
    }

    #coordinatePlane {
      width: 400px;
      height: 400px;
      border: 2px solid black;
      margin: 20px auto;
      position: relative; /* IMPORTANT FIX */
    }

    .axis {
      position: absolute;
      background-color: black;
    }

    #xAxis {
      width: 100%;
      height: 2px;
      top: 50%;
    }

    #yAxis {
      height: 100%;
      width: 2px;
      left: 50%;
    }

    .point {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="#start">Table</a>
      <a href="#input">Input</a>
      <a href="#output">Output</a>
    </nav>

    <h1 style="padding: 30px">Xander Gabriel Fama / Cesium - Mar 2026</h1>
    <h2 id="start">Nlogonia</h2>
  </header>

  <section id="table">
    <table>
      <tr>
        <th>input</th>
        <th>output</th>
      </tr>

      <tr>
        <td>2 1 10 10</td>
        <td>NE</td>
      </tr>

      <tr>
        <td>2 1 -10 1</td>
        <td>divisa</td>
      </tr>

      <tr>
        <td>2 1 0 33</td>
        <td>NO</td>
      </tr>

      <tr>
        <td id="in1">0 0 0 0</td>
        <td id="out1">divisa</td>
      </tr>
    </table>
    <hr>
  </section>

  <section id="input">
    <h2>Input</h2>

    <h4>Axis Reference:</h4>
    <input type="number" id="x0" placeholder="0">
    <input type="number" id="y0" placeholder="0">

    <h4>Point Coordinates:</h4>
    <input type="number" id="x" placeholder="x">
    <input type="number" id="y" placeholder="y">

    <br><br>

    <button onclick="plotPoint(
      Number(document.getElementById('x0').value),
      Number(document.getElementById('y0').value),
      Number(document.getElementById('x').value),
      Number(document.getElementById('y').value)
    )">
      Plot
    </button>
  </section>

  <section id="output">
    <h2>Output</h2>

    <div id="coordinatePlane">
      <div id="xAxis" class="axis"></div>
      <div id="yAxis" class="axis"></div>
    </div>

    <hr>
  </section>

  <script src="script.js"></script>
</body>
</html>
